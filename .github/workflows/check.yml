name: check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Install npm deps
        run: |
          npm install
          # 补丁验证（CI 环境不应崩溃，如果崩溃说明补丁文件名版本失配）
          grep -q "/glm/i" node_modules/oh-my-openagent/dist/index.js || {
            echo "❌ hephaestus GLM 补丁未应用"
            exit 1
          }

      - name: Makefile syntax check
        run: make help

      - name: tui.json / opencode.json plugin 同步检查
        run: make tui-sync

      - name: JSON 语法验证
        run: |
          for f in opencode.json oh-my-openagent.json tui.json package.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || exit 1
            echo "✓ $f 语法正确"
          done

      - name: OMO 配置 schema 校验（ajv）
        run: |
          # 用项目自带 ajv（npm install 后可用），跑 OMO 官方 schema 校验 oh-my-openagent.json
          if [ ! -d node_modules/ajv ]; then
            echo "⚠️  ajv 未安装，跳过 schema 校验"
            exit 0
          fi
          node -e "const Ajv=require('ajv');const s=require('./node_modules/oh-my-openagent/dist/oh-my-opencode.schema.json');const d=require('./oh-my-openagent.json');const a=new Ajv({strict:false,allErrors:true});const v=a.compile(s);if(!v(d)){console.error('❌ OMO schema 校验失败:');console.error(JSON.stringify(v.errors,null,2));process.exit(1)}else{console.log('✓ oh-my-openagent.json 符合 OMO schema')}"

        run: |
          test -s skills.lock && echo "✓ skills.lock 存在且非空（$(wc -l < skills.lock) 条）" || {
            echo "❌ skills.lock 缺失或为空（运行 make skills-lock 生成）"
            exit 1
          }

      - name: skills.lock 格式校验
        run: |
          # 每行必须匹配：<64-hex>  lark-<name>/SKILL.md
          BAD=$(awk '!/^[a-f0-9]{64}  lark-[a-z0-9_-]+\/SKILL\.md$/ {print NR": "$0}' skills.lock)
          if [ -n "$BAD" ]; then
            echo "❌ skills.lock 格式错误（应：<64hex>  lark-<name>/SKILL.md）："
            echo "$BAD"
            exit 1
          fi
          echo "✓ skills.lock 格式正确（27 行，每行 <hash>  lark-*/SKILL.md）"

      # 注：完整 make check 在 CI 环境会因缺 API key 而警告，所以只跑上面的子集
